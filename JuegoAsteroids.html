<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Juego Asteroids</title>
  <style>
    body{
      background: #222;
      display: flex;
      justify-content: center;
      margin-top: 100px;
    }

    canvas{
      border: 1px solid white;
    }
  </style>
</head>
<body>

  <canvas id="Canvas" width="500" height="500"></canvas>

  <script>
    let canvas = document.getElementById("Canvas");
    let ctx = canvas.getContext("2d");

    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    //          (x,y,ancho,alto)

    
    let naveX = canvas.width / 2;
    let naveY = canvas.height / 2;

    function dibujarNave(){
      ctx.beginPath();

      ctx.moveTo(naveX, naveY - 20);
      ctx.lineTo(naveX - 15, naveY + 15);
      ctx.lineTo(naveX + 15, naveY + 15); 

      ctx.closePath();

      ctx.strokeStyle = "white";
      ctx.stroke();
    }

    dibujarNave();

  </script>

</body>
</html>
