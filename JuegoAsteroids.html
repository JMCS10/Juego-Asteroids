<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Juego Asteroids</title>
  <style>
    body{
      background: #222;
      display: flex;
      justify-content: center;
      margin-top: 100px;
    }

    canvas{
      border: 1px solid white;
    }
  </style>
</head>
<body>

  <canvas id="Canvas" width="500" height="500"></canvas>

  <script>
    let canvas = document.getElementById("Canvas");
    let ctx = canvas.getContext("2d");

    
    let naveX = canvas.width / 2;
    let naveY = canvas.height / 2;
    let naveAngulo = 0;

    
    let teclas = {};

    document.addEventListener("keydown", function(e){
      teclas[e.key] = true;
    });

    document.addEventListener("keyup", function(e){
      teclas[e.key] = false;
    });

    function dibujarNave(){
      ctx.save();
      ctx.translate(naveX, naveY);
      ctx.rotate(naveAngulo);

      ctx.beginPath();
      ctx.moveTo(0, -20);   
      ctx.lineTo(-15, 15);  
      ctx.lineTo(15, 15);   
      ctx.closePath();

      ctx.strokeStyle = "white";
      ctx.stroke();

      ctx.restore();
    }

    function actualizar(){
      if (teclas["ArrowLeft"]){
        naveAngulo -= 0.05;
      }
      if (teclas["ArrowRight"]){
        naveAngulo += 0.05; 
      }
    }

    function gameLoop(){
      
      ctx.fillStyle = "black";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      
      actualizar();
      dibujarNave();
    }

    setInterval(gameLoop, 16);

  </script>

</body>
</html>
